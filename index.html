<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Engineer Scope Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: #00ff00; font-family: monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #header { height: 50px; line-height: 50px; background: #002200; text-align: center; border-bottom: 2px solid #00ff00; font-weight: bold; }
        #canvasContainer { flex: 1; position: relative; width: 100%; background: #000; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #controls { height: 180px; background: #001100; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; border-top: 2px solid #00ff00; }
        button { background: #00ff00; color: #000; border: none; font-weight: bold; border-radius: 12px; font-size: 1.1em; active-opacity: 0.7; }
        button:active { background: #00cc00; transform: scale(0.98); }
        .info { grid-column: span 2; text-align: center; font-size: 0.9em; color: #008800; }
    </style>
</head>
<body>
    <div id="header">LAB SCOPE v1.1 ⚡️</div>
    <div id="canvasContainer">
        <canvas id="scopeCanvas"></canvas>
    </div>
    <div id="controls">
        <button id="startBtn">START PROBE</button>
        <button onclick="location.reload()">RESET</button>
        <div class="info">Status: <span id="status">Ready</span></div>
    </div>

    <script>
        // Register Service Worker for Offline Mode
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(() => {});
        }

        const canvas = document.getElementById('scopeCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const statusDisp = document.getElementById('status');

        let audioCtx, analyser, dataArray, source;

        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        async function initScope() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                statusDisp.innerText = "LIVE (MIC/AUX)";
                startBtn.style.display = "none";
                draw();
            } catch (err) {
                statusDisp.innerText = "Error: Mic Denied!";
            }
        }

        function draw() {
            requestAnimationFrame(draw);
            if (!analyser) return;
            analyser.getByteTimeDomainData(dataArray);

            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Grid
            ctx.strokeStyle = '#003300';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=canvas.width/10) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let i=0; i<canvas.height; i+=canvas.height/8) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Draw Wave
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 3;
            ctx.beginPath();
            let sliceWidth = canvas.width / dataArray.length;
            let x = 0;
            for (let i = 0; i < dataArray.length; i++) {
                let v = dataArray[i] / 128.0;
                let y = (v * canvas.height) / 2;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.stroke();
        }

        // Touch-friendly listener
        startBtn.addEventListener('click', () => {
            if (!audioCtx) initScope();
            else if (audioCtx.state === 'suspended') audioCtx.resume();
        });
    </script>
</body>
</html>
